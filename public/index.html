<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#040a09">

<link rel="manifest" href="/manifest.json">

<title>Turquoise</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

<style>

/* ── Reset ───────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html,body{
height:100%;
overflow:hidden;
background:#040a09;
color:#c4ede9
}

body{
font-family:'Space Mono',monospace;
font-size:13px;
-webkit-font-smoothing:antialiased;
}

/* Fix for menus escaping containers */
body.menu-open{
overflow:hidden;
}

/* ── Palette ─────────────────────────────────────── */
:root{

--tq:#40e0d0;
--tq2:#1a9e94;
--tq3:#0a3d39;

--ug:#6bff7b;
--ug2:#2d7a34;

--uy:#ffe14a;
--uy2:#a88a00;

--bg0:#040a09;
--bg1:#071a18;
--bg2:#0d2e2a;

--text:#c4ede9;
--dim:#4a8a84;
--mute:#1e5550;

--err:#ff6040;
--warn:#ffe14a;
--ok:#6bff7b;

--r:1px;

}

/* ── Scrollbars ──────────────────────────────────── */

::-webkit-scrollbar{
width:3px;
height:3px;
}

::-webkit-scrollbar-track{
background:transparent;
}

::-webkit-scrollbar-thumb{
background:var(--mute);
border-radius:2px;
}

/* ── App Shell ───────────────────────────────────── */

#app{
display:grid;
grid-template-columns:220px 1fr 260px;
grid-template-rows:44px 1fr;

height:100dvh;

background:var(--bg0);

position:relative;
overflow:hidden;
}

/* Decorative overlay */

#app::before{

content:'';

position:fixed;
inset:0;

background:

linear-gradient(
17deg,
transparent 41%,
rgba(64,224,208,.025) 41%,
rgba(64,224,208,.025) 41.3%,
transparent 41.3%
),

linear-gradient(
17deg,
transparent 63%,
rgba(107,255,123,.018) 63%,
rgba(107,255,123,.018) 63.2%,
transparent 63.2%
);

pointer-events:none;
z-index:0;

}

/* ── Header ───────────────────────────────────── */

#header{

grid-column:1/-1;

display:flex;
align-items:center;

background:var(--bg1);

clip-path:polygon(
0 0,
100% 0,
100% 100%,
0 calc(100% - 6px)
);

padding:0 16px 6px 16px;

position:relative;
z-index:20;

border-bottom:1px solid var(--mute);

}

#header-logo{

font-family:'Syne',sans-serif;
font-weight:800;

font-size:15px;

letter-spacing:.25em;

color:var(--tq);

text-transform:uppercase;

clip-path:polygon(
0 0,
calc(100% - 6px) 0,
100% 100%,
0 100%
);

background:rgba(64,224,208,.06);

padding:3px 18px 3px 8px;

margin-right:24px;

}

/* Identity row */

#identity-row{
display:flex;
align-items:center;
gap:8px;
cursor:pointer;
flex:1;
min-width:0;
}

#identity-row::before{
content:'▸';
color:var(--dim);
font-size:10px;
}

#nick-display{
font-family:'Syne',sans-serif;
font-weight:700;
font-size:13px;

color:var(--tq);

letter-spacing:.05em;

white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

#nick-input{

display:none;

background:var(--bg2);

border:1px solid var(--tq2);

color:var(--tq);

padding:2px 8px;

font-family:inherit;
font-size:13px;

width:140px;

outline:none;

}

#nick-input.visible{
display:block;
}

#full-fp{

font-size:9px;
color:var(--dim);

white-space:nowrap;
overflow:hidden;

text-overflow:ellipsis;

max-width:200px;

letter-spacing:.06em;

}

/* Right side */

#hdr-right{
display:flex;
align-items:center;
gap:8px;
margin-left:auto;
}

#conn-status{

font-size:9px;
letter-spacing:.1em;

color:var(--dim);

padding:2px 8px;

background:rgba(64,224,208,.06);

transition:color .3s,background .3s;

}

#conn-status.ok{
color:var(--ug);
}

#conn-status.warn{
color:var(--uy);
}

#conn-status.err{
color:var(--err);
}

/* ── Main Chat ─────────────────────────────────── */

#main{

grid-row:2;
grid-column:2;

display:flex;
flex-direction:column;

overflow:hidden;

position:relative;

z-index:3;

}

#chat-area{

flex:1;

overflow-y:auto;

padding:16px 18px 8px;

display:flex;
flex-direction:column;

gap:4px;

position:relative;

scroll-behavior:smooth;

}

/* Drag overlay */

#chat-area.drag-over::after{

content:'drop to send';

position:absolute;
inset:0;

background:rgba(64,224,208,.08);

border:2px dashed var(--tq2);

display:flex;
align-items:center;
justify-content:center;

font-size:20px;
letter-spacing:.2em;

color:var(--tq2);

pointer-events:none;

}

/* Compose */

#compose-area{

flex-shrink:0;

padding:8px 12px 10px;

background:var(--bg1);

border-top:1px solid var(--mute);

display:flex;
gap:8px;

align-items:flex-end;

position:relative;
z-index:10;

}

/* Textarea fix */

#msg-input{

width:100%;

min-height:32px;
max-height:160px;

resize:none;

overflow-y:auto;

background:var(--bg2);

border:1px solid var(--mute);

color:var(--text);

font-family:inherit;

font-size:12px;

padding:7px 10px;

outline:none;

}

#msg-input:focus{
border-color:var(--tq2);
}
/* ── Plus Menu ─────────────────────────────────── */

#plus-menu{

position:fixed;

bottom:70px;
left:14px;

background:var(--bg1);

border:1px solid var(--mute);

min-width:190px;

z-index:200;

display:none;

box-shadow:0 8px 32px rgba(0,0,0,.6);

}

#plus-menu.visible{
display:block;
}

.pm-item{

padding:7px 14px;

font-size:11px;

color:var(--dim);

cursor:pointer;

transition:background .1s,color .1s;

}

.pm-item:hover{

background:rgba(64,224,208,.07);

color:var(--tq);

}
/* ── Call Panel ───────────────────────────────── */

#call-panel{

display:none;

position:fixed;

inset:0;

z-index:100;

background:rgba(4,10,9,.94);

flex-direction:column;

align-items:center;

justify-content:center;

backdrop-filter:blur(4px);

}

#call-panel.visible{
display:flex;
}

/* video grid */

#call-videos{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:12px;

max-width:900px;

width:100%;

padding:16px;

}

/* video tile */

.call-video-tile{

background:var(--bg2);

position:relative;

overflow:hidden;

aspect-ratio:16/9;

}

.call-video-tile video{

width:100%;
height:100%;

object-fit:cover;

}

/* pip */

.call-pip{

position:fixed;

width:160px;
height:100px;

bottom:90px;

right:280px;

z-index:101;

cursor:grab;

}
/* ── Responsive ───────────────────────────────── */

@media(max-width:900px){

#app{
grid-template-columns:220px 1fr;
}

#netlog-panel{
display:none;
}

}

@media(max-width:640px){

#app{
grid-template-columns:1fr;
grid-template-rows:44px 1fr;
}

#sidebar{

position:fixed;

left:-220px;

top:44px;

width:220px;

height:calc(100% - 44px);

transition:left .25s;

}

#sidebar.show{
left:0;
}

}
