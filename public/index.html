<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#030d0d"/>
<meta name="description" content="Encrypted peer-to-peer communication. No servers. LAN-first."/>
<title>Turquoise</title>
<link rel="manifest" href="manifest.json"/>
<style>
/* ═══════════════════════════════════════════════════════════════════════════
   TURQUOISE v7 — Design System
   Philosophy: The void speaks in teal. Every pixel earns its place.
   Mathematics: φ = 1.618 · Fibonacci spacing · Monospace discipline
   ═══════════════════════════════════════════════════════════════════════════ */

:root{
  /* Void — a gradient from absolute dark toward consciousness */
  --void:     #030d0d;
  --deep:     #060f0f;
  --surface:  #091515;
  --raised:   #0d1c1c;
  --high:     #122222;

  /* Signal — turquoise is the only color that exists */
  --tq:       #40E0D0;
  --tq-hi:    #7EEEE4;
  --tq-mid:   rgba(64,224,208,.6);
  --tq-lo:    rgba(64,224,208,.35);
  --tq-dim:   rgba(64,224,208,.1);
  --tq-mist:  rgba(64,224,208,.055);
  --tq-edge:  rgba(64,224,208,.14);
  --tq-glow:  0 0 18px rgba(64,224,208,.22);

  /* Semantic */
  --ok:       #3DBF7A;
  --warn:     #D9A040;
  --err:      #BF4040;
  --text:     rgba(210,238,234,.78);

  /* φ-scaled spacing (Fibonacci × .25rem) */
  --s1:  .25rem;   /*  4px */
  --s2:  .5rem;    /*  8px */
  --s3:  .75rem;   /* 12px */
  --s4:  1rem;     /* 16px */
  --s5:  1.618rem; /* 26px */
  --s6:  2.618rem; /* 42px */
  --s7:  4.236rem; /* 68px */

  /* Layout constants */
  --sidebar-w: 38.2%;         /* φ⁻¹ of viewport */
  --hdr-h:     3.618rem;      /* φ² ≈ header */
  --bar-h:     2.8rem;        /* input bar height */
  --nav-h:     3.5rem;        /* mobile bottom spacing */
}

/* ── Reset ─────────────────────────────────────────────────────────────── */
*,*::before,*::after{
  box-sizing:border-box; margin:0; padding:0;
  -webkit-tap-highlight-color:transparent;
}
html,body{
  height:100%; overflow:hidden;
  background:var(--void);
  color:var(--tq);
  font: 13px/1.62 'Courier New','Consolas','Lucida Console',monospace;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

/* ═══════════════════════════════════════════════════════════════════════════
   APP SHELL — Desktop: side-by-side · Mobile: view-based
   ═══════════════════════════════════════════════════════════════════════════ */
#app{
  display:grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  height:100dvh;
  position:relative;
  overflow:hidden;
}

/* ═══════════════════════════════════════════════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════════════════════════════════════════════ */
#sidebar{
  display:flex; flex-direction:column;
  background:var(--deep);
  border-right:1px solid var(--tq-edge);
  overflow:hidden;
}

/* ── Identity block ─────────────────────────────────────────────────────── */
#id-block{
  padding:var(--s5) var(--s5) var(--s4);
  border-bottom:1px solid var(--tq-edge);
  flex-shrink:0;
}
.wordmark{
  font-size:.52rem; letter-spacing:.55em;
  color:var(--tq-lo); margin-bottom:var(--s4);
  text-transform:uppercase;
}

.nick-row{
  display:flex; align-items:center; gap:var(--s2);
  cursor:pointer; padding:var(--s2) 0;
  border-bottom:1px solid transparent;
  transition:border-color .18s;
}
.nick-row:hover{ border-color:var(--tq-edge); }
#nick-val{
  flex:1; font-size:.95rem; color:var(--tq);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.nick-pen{
  font-size:.62rem; color:var(--tq-lo);
  opacity:0; transition:opacity .15s; flex-shrink:0;
}
.nick-row:hover .nick-pen{ opacity:1; }

#nick-input{
  display:none; width:100%;
  background:var(--raised); border:1px solid var(--tq);
  color:var(--tq); font:inherit; font-size:.95rem;
  padding:var(--s1) var(--s3); outline:none;
  margin:var(--s2) 0;
}

.fp-line{
  font-size:.56rem; color:var(--tq-lo);
  margin-top:var(--s2); word-break:break-all;
  letter-spacing:.03em; line-height:1.6;
}

.sig-row{
  display:flex; align-items:center; gap:var(--s2);
  margin-top:var(--s3);
}
.sig-dot{
  width:5px; height:5px; border-radius:50%; flex-shrink:0;
  transition:background .4s, box-shadow .4s;
}
.sig-dot.connecting  { background:var(--warn); animation:pulse 1s infinite; }
.sig-dot.connected   { background:var(--ok);   box-shadow:0 0 6px var(--ok); }
.sig-dot.disconnected{ background:var(--err);  }
@keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.2} }
#sig-text{ font-size:.6rem; color:var(--tq-lo); }

/* ── Group row ──────────────────────────────────────────────────────────── */
.group-row{
  margin:var(--s3) var(--s2) 0;
  padding:var(--s2) var(--s4);
  border:1px solid var(--tq-edge);
  background:var(--surface);
  display:flex; align-items:center; gap:var(--s2);
  cursor:pointer; transition:background .12s, border-color .12s;
  min-height:2.8rem;
}
.group-row:hover  { background:var(--tq-mist); border-color:var(--tq-dim); }
.group-row.active { background:var(--tq-dim);  border-color:var(--tq); }
.group-icon { font-size:.72rem; color:var(--tq-lo); }
.group-name { font-size:.78rem; color:var(--tq); letter-spacing:.1em; }
#group-count{ margin-left:auto; font-size:.6rem; color:var(--tq-lo); }
#group-badge{
  margin-left:auto;
  background:var(--tq); color:var(--void);
  width:1.25rem; height:1.25rem; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:.58rem; font-weight:700;
}

/* ── Peer list ──────────────────────────────────────────────────────────── */
#peer-list{
  flex:1; overflow-y:auto;
  padding:var(--s1) var(--s2) var(--s2);
}
.no-peers{
  padding:var(--s7) var(--s5);
  text-align:center;
  font-size:.62rem; color:var(--tq-lo);
  letter-spacing:.12em; line-height:2.6;
}

.peer-tile{
  display:flex; align-items:center; gap:var(--s2);
  padding:var(--s2) var(--s3);
  border:1px solid var(--tq-edge);
  background:var(--surface);
  cursor:pointer; margin-bottom:1px;
  transition:background .1s, border-color .1s;
  min-height:3rem;
}
.peer-tile:hover  { background:var(--tq-mist); border-color:var(--tq-dim); }
.peer-tile.active { background:var(--tq-dim);  border-color:var(--tq); }

.p-dot{
  width:6px; height:6px; border-radius:50%; flex-shrink:0;
  transition:background .3s, box-shadow .3s;
}
.p-dot.on  { background:var(--ok);    box-shadow:0 0 5px var(--ok); }
.p-dot.off { background:var(--tq-lo); }

.p-info{ flex:1; min-width:0; }
.p-name{
  font-size:.82rem; color:var(--tq);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.p-id  { font-size:.56rem; color:var(--tq-lo); margin-top:1px; }
.p-prev{
  font-size:.64rem; color:var(--tq-lo);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-top:2px;
}

.p-right{ display:flex; gap:var(--s1); align-items:center; flex-shrink:0; }
.p-btn{
  width:1.8rem; height:1.8rem;
  border:1px solid var(--tq-edge); background:transparent;
  color:var(--tq-lo); font-size:.7rem;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .12s;
}
.p-btn:hover{ color:var(--tq); border-color:var(--tq); background:var(--tq-mist); }
.p-badge{
  min-width:1.25rem; height:1.25rem; border-radius:.62rem;
  background:var(--tq); color:var(--void);
  display:flex; align-items:center; justify-content:center;
  font-size:.58rem; font-weight:700; padding:0 .25rem;
}

/* ── Net log ────────────────────────────────────────────────────────────── */
#net-log{
  max-height:5rem; overflow-y:auto;
  border-top:1px solid var(--tq-edge);
  background:var(--void); flex-shrink:0;
}
.nlog{
  font-size:.56rem; color:var(--tq-lo);
  padding:1px var(--s4); line-height:2;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.nlog.err{ color:var(--err); }

/* ═══════════════════════════════════════════════════════════════════════════
   CHAT AREA
   ═══════════════════════════════════════════════════════════════════════════ */
#chat-area{
  display:flex; flex-direction:column;
  background:var(--void); overflow:hidden; position:relative;
}
#chat-area.drag-over{
  outline:2px dashed var(--tq-mid);
  outline-offset:-3px;
}

/* ── Chat header ────────────────────────────────────────────────────────── */
#chat-header{
  height:var(--hdr-h);
  display:flex; align-items:center;
  padding:0 var(--s5);
  gap:var(--s2);
  border-bottom:1px solid var(--tq-edge);
  background:var(--deep);
  flex-shrink:0;
}

.back-btn{
  display:none;          /* shown on mobile via media query */
  background:none; border:none;
  color:var(--tq-lo); font:inherit; font-size:1.1rem;
  width:2rem; height:2rem;
  align-items:center; justify-content:center;
  cursor:pointer; flex-shrink:0;
  transition:color .12s;
}
.back-btn:hover{ color:var(--tq); }

.ch-empty{ font-size:.7rem; color:var(--tq-lo); letter-spacing:.15em; }
.ch-title{ font-size:.85rem; color:var(--tq); }
.ch-sub  { font-size:.56rem; color:var(--tq-lo); margin-top:2px; }

#ch-acts{ margin-left:auto; display:flex; gap:var(--s1); }
.act-btn{
  height:1.8rem; padding:0 var(--s3);
  border:1px solid var(--tq-edge); background:transparent;
  color:var(--tq-lo); font:inherit; font-size:.64rem;
  letter-spacing:.06em; cursor:pointer; white-space:nowrap;
  transition:all .12s;
}
.act-btn:hover{ color:var(--tq); border-color:var(--tq); background:var(--tq-mist); }
.act-btn.live { color:var(--void); background:var(--tq); border-color:var(--tq); }

/* ── Call layer ─────────────────────────────────────────────────────────── */
#call-layer{
  display:none;
  position:absolute; inset:var(--hdr-h) 0 0; z-index:30;
  background:var(--void);
  cursor:pointer;
}
#call-layer.visible{ display:block; }
#call-layer.fs{ position:fixed; inset:0; z-index:100; }

#rv{
  width:100%; height:100%;
  object-fit:cover; background:var(--deep);
}
#lv{
  position:absolute;
  bottom:var(--s5); right:var(--s5);
  width:28%; aspect-ratio:4/3;
  object-fit:cover; background:var(--raised);
  transform:scaleX(-1);
  border:1px solid var(--tq-edge);
  z-index:2; cursor:default;
}

.call-foot{
  position:absolute; bottom:0; left:0; right:0; z-index:3;
  display:flex; align-items:center; justify-content:space-between;
  padding:var(--s4) var(--s5);
  background:linear-gradient(transparent, rgba(3,13,13,.9) 80%);
}
.call-who { font-size:.72rem; color:var(--tq-lo); letter-spacing:.1em; }
.call-time{ font-size:1.1rem; color:var(--tq); font-variant-numeric:tabular-nums; }
.btn-end{
  padding:var(--s2) var(--s4);
  background:var(--err); border:none; color:#fff;
  font:inherit; font-size:.7rem; letter-spacing:.08em;
  cursor:pointer; transition:opacity .12s;
}
.btn-end:hover{ opacity:.85; }

/* ── Incoming call ──────────────────────────────────────────────────────── */
#incoming-banner{
  position:absolute;
  top:calc(var(--hdr-h) + var(--s4));
  left:50%; transform:translateX(-50%);
  z-index:40;
  background:var(--raised);
  border:1px solid var(--tq);
  padding:var(--s4) var(--s5);
  text-align:center; min-width:200px;
}
#inc-label{ font-size:.78rem; color:var(--tq); margin-bottom:var(--s3); }
.inc-btns { display:flex; gap:var(--s2); justify-content:center; }
.btn-accept{
  padding:var(--s2) var(--s4);
  background:var(--ok); border:none; color:var(--void);
  font:inherit; font-size:.7rem; letter-spacing:.08em;
  cursor:pointer;
}

/* ── Messages ───────────────────────────────────────────────────────────── */
#msgs{
  flex:1; overflow-y:auto;
  padding:var(--s5);
  display:flex; flex-direction:column; gap:var(--s4);
}

.empty-state{
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:var(--s3); color:var(--tq-lo); text-align:center;
}
.es-icon{ font-size:2rem; opacity:.22; }
.es-text{ font-size:.65rem; letter-spacing:.2em; }

/* ── Message bubbles ────────────────────────────────────────────────────── */
.msg{ display:flex; flex-direction:column; max-width:68%; }
.msg.own  { align-self:flex-end;  align-items:flex-end; }
.msg.them { align-self:flex-start;align-items:flex-start; }

.msg-meta{
  font-size:.56rem; color:var(--tq-lo);
  margin-bottom:.22rem; letter-spacing:.04em;
}
.msg-body{
  padding:var(--s2) var(--s3);
  border:1px solid var(--tq-edge);
  word-break:break-word; white-space:pre-wrap;
  font-size:.82rem; line-height:1.7;
}
.msg.own  .msg-body{ background:var(--tq-dim); color:var(--tq); }
.msg.them .msg-body{ background:var(--surface); color:var(--text); }

/* ── File card ──────────────────────────────────────────────────────────── */
.fcard{
  min-width:170px; max-width:260px;
  padding:var(--s2) var(--s3);
  border:1px solid var(--tq-edge);
  background:var(--surface);
}
.fc-name { font-size:.78rem; color:var(--tq); word-break:break-all; margin-bottom:var(--s1); }
.fc-sz   { font-size:.6rem;  color:var(--tq-lo); margin-bottom:var(--s2); }
.fc-speed{ font-size:.58rem; color:var(--tq-lo); margin-top:var(--s1); }
.fc-err  { font-size:.6rem;  color:var(--err);   margin-top:var(--s1); }

.prg-track{ height:1px; background:var(--tq-edge); position:relative; margin-bottom:var(--s2); }
.prg-fill {
  position:absolute; left:0; top:0; bottom:0;
  background:var(--tq); transition:width .08s linear;
}

.dl-btn{
  display:block; padding:var(--s1) var(--s2);
  border:1px solid var(--tq); color:var(--tq);
  background:transparent; font:inherit; font-size:.65rem;
  text-align:center; text-decoration:none; cursor:pointer;
  letter-spacing:.08em; transition:background .1s;
}
.dl-btn:hover{ background:var(--tq-dim); }

/* ── System messages ────────────────────────────────────────────────────── */
.sys-msg{
  text-align:center; font-size:.62rem;
  color:var(--tq-lo); letter-spacing:.1em;
}
.sys-msg.err{ color:var(--err); }

/* ── Input bar ──────────────────────────────────────────────────────────── */
#input-bar{
  align-items:flex-end; gap:var(--s1);
  padding:var(--s2) var(--s5);
  border-top:1px solid var(--tq-edge);
  background:var(--deep); flex-shrink:0;
}
.ibar-btn{
  width:2.2rem; height:2.2rem; flex-shrink:0;
  border:1px solid var(--tq-edge); background:transparent;
  color:var(--tq-lo); font-size:.85rem;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .12s; user-select:none; touch-action:none;
}
.ibar-btn:hover      { color:var(--tq); border-color:var(--tq); }
.ibar-btn.live       { color:var(--void); background:var(--ok); border-color:var(--ok); box-shadow:0 0 10px var(--ok); }

#msg-in{
  flex:1; background:var(--raised);
  border:1px solid var(--tq-edge);
  color:var(--tq); font:inherit; font-size:.82rem;
  padding:var(--s2);
  outline:none; resize:none;
  min-height:2.2rem; max-height:7rem;
  overflow-y:auto; line-height:1.55;
}
#msg-in:focus         { border-color:var(--tq); }
#msg-in::placeholder  { color:var(--tq-lo); }

#send-btn{
  height:2.2rem; padding:0 var(--s4);
  border:1px solid var(--tq); background:transparent;
  color:var(--tq); font:inherit; font-size:.65rem;
  letter-spacing:.1em; cursor:pointer; flex-shrink:0;
  transition:background .1s;
}
#send-btn:hover{ background:var(--tq-dim); }

/* ── PTT transmit banner ────────────────────────────────────────────────── */
#ptt-bar{
  display:none;
  position:fixed; bottom:calc(var(--s4) + 3rem);
  left:50%; transform:translateX(-50%);
  background:var(--ok); color:var(--void);
  padding:var(--s2) var(--s6);
  font-size:.64rem; letter-spacing:.22em;
  z-index:90; pointer-events:none;
}
#ptt-bar.on{ display:block; }

/* ── Scrollbar ──────────────────────────────────────────────────────────── */
::-webkit-scrollbar{ width:2px; height:2px; }
::-webkit-scrollbar-track{ background:transparent; }
::-webkit-scrollbar-thumb{ background:var(--tq-edge); }

/* ═══════════════════════════════════════════════════════════════════════════
   LOADING SCREEN
   ═══════════════════════════════════════════════════════════════════════════ */
#loading{
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  height:100dvh; gap:var(--s4);
  color:var(--tq-lo); font-size:.62rem; letter-spacing:.3em;
}
.load-bar{
  width:3px; height:var(--s5);
  background:var(--tq);
  animation:load-pulse .8s ease-in-out infinite;
}
@keyframes load-pulse{
  0%,100%{ opacity:1; transform:scaleY(1); }
  50%    { opacity:.25; transform:scaleY(.35); }
}

/* ═══════════════════════════════════════════════════════════════════════════
   MOBILE — Full view-state navigation
   State is controlled by: body[data-view="peers|chat|call"]
   ═══════════════════════════════════════════════════════════════════════════ */
@media(max-width:640px){
  #app{ display:block; height:100dvh; overflow:hidden; position:relative; }

  /* Both panels absolute, full screen */
  #sidebar{
    position:absolute; inset:0;
    border-right:none;
    z-index:1;
    transform:translateX(0);
    transition:transform .26s cubic-bezier(.4,0,.2,1);
    padding-bottom:var(--nav-h);
  }
  #chat-area{
    position:absolute; inset:0;
    z-index:2;
    transform:translateX(100%);
    transition:transform .26s cubic-bezier(.4,0,.2,1);
  }

  /* View switching */
  body[data-view="peers"] #sidebar    { transform:translateX(0); }
  body[data-view="peers"] #chat-area  { transform:translateX(100%); }
  body[data-view="chat"]  #sidebar    { transform:translateX(-100%); }
  body[data-view="chat"]  #chat-area  { transform:translateX(0); }
  body[data-view="call"]  #chat-area  { transform:translateX(0); }

  /* Back button visible on mobile */
  .back-btn{ display:flex !important; }

  /* Call overlay fills screen on mobile */
  #call-layer{ inset:0 !important; }
  #lv{ width:38vw; }

  /* Wider message bubbles */
  .msg{ max-width:88%; }

  /* Input bar pinned to screen bottom (above virtual keyboard) */
  #input-bar{
    position:fixed; bottom:0; left:0; right:0;
    z-index:20; padding:var(--s2) var(--s4);
  }
  #msgs{ padding-bottom:calc(var(--bar-h) + var(--s5)); }

  /* Prevent iOS zoom on textarea focus — must be ≥16px */
  #msg-in{ font-size:16px; }

  /* Larger peer tiles for touch */
  .peer-tile{ min-height:3.5rem; }

  .group-row{ margin:var(--s2) var(--s1) 0; }
}

@media(min-width:641px){
  .back-btn{ display:none !important; }
  body[data-view]{ /* no effect on desktop */ }
}
</style>
</head>
<body data-view="peers">

<div id="app">
  <div id="loading">
    <div class="load-bar"></div>
    <div>initializing</div>
  </div>
</div>

<div id="ptt-bar">● transmitting</div>
<input type="file" id="file-pick" style="display:none" multiple/>

<script type="module" src="main.js"></script>
</body>
</html>
