<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#040a09">
<title>Turquoise</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:#040a09;color:#c4e8e4;font-family:"DM Mono",ui-monospace,monospace}
button,input,textarea{font:inherit;color:inherit}
:root{
  --bg0:#040a09;--bg1:#081210;--bg2:#0c1916;--bg3:#112019;
  --tq:#40e0d0;--tq-mid:#1e7068;--tq-low:#0d3530;
  --tx0:#c4e8e4;--tx1:#7ab8b2;--tx2:#3d7a74;--err:#e05040;--ok:#40d090;
  --sp1:.25rem;--sp2:.5rem;--sp3:.75rem;--sp4:1rem;--sp5:1.5rem;
}

#app{display:flex;height:100dvh;width:100vw;overflow:hidden}
#sidebar{
  width:340px;max-width:45vw;min-width:260px;background:var(--bg1);
  border-right:1px solid var(--tq-low);display:flex;flex-direction:column;overflow:hidden
}
#device-header{padding:var(--sp4);border-bottom:1px solid var(--tq-low)}
.wordmark{display:flex;justify-content:space-between;align-items:center;color:var(--tq);letter-spacing:.24em;text-transform:uppercase;font-size:.62rem}
#nick-line{margin-top:var(--sp3);font-size:.95rem;color:var(--tx0);display:flex;align-items:center;gap:var(--sp2)}
#full-fp{margin-top:var(--sp2);font-size:.62rem;color:var(--tx2);word-break:break-all}
.list-block{border-bottom:1px solid var(--tq-low);padding:var(--sp3)}
.block-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--sp2);font-size:.62rem;color:var(--tx1);letter-spacing:.18em;text-transform:uppercase}
.block-btn{
  border:1px solid var(--tq-mid);color:var(--tq);background:transparent;cursor:pointer;padding:2px 8px;font-size:.58rem
}
#peer-list,#circles-list{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow:auto}
.peer-item,.circle-item{
  border:1px solid var(--tq-low);background:var(--bg2);padding:8px 10px;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;font-size:.74rem
}
.peer-item.active,.circle-item.active{border-color:var(--tq-mid);background:var(--bg3)}
.peer-left{display:flex;align-items:center;gap:8px;min-width:0}
.dot{width:8px;height:8px;border-radius:50%;background:#355}
.dot.on{background:var(--ok)}
.peer-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini{font-size:.62rem;color:var(--tx2)}
.circle-edit{border:0;background:transparent;color:var(--tx2);cursor:pointer;font-size:.72rem}
#net-log{margin-top:auto;font-size:.62rem;color:var(--tx2);padding:var(--sp3);height:110px;overflow:auto;border-top:1px solid var(--tq-low)}

#chat-area{
  flex:1;min-width:0;height:100%;display:flex;flex-direction:column;overflow:hidden;background:var(--bg0)
}

/* fixed top bar */
#chat-header{
  flex:0 0 auto;position:sticky;top:0;z-index:40;
  display:flex;align-items:center;gap:var(--sp2);
  padding:10px 12px;background:rgba(4,10,9,.96);backdrop-filter:blur(6px);
  border-bottom:1px solid var(--tq-low)
}
#back-btn{display:none;border:1px solid var(--tq-low);background:var(--bg2);cursor:pointer;padding:4px 8px}
#chat-title-wrap{min-width:0;flex:1}
#chat-title{font-size:.86rem;color:var(--tx0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#chat-subtitle{font-size:.62rem;color:var(--tx2)}
#chat-actions{display:flex;gap:8px}
.icon-btn{
  width:34px;height:34px;border:1px solid var(--tq-low);background:var(--bg2);cursor:pointer;
  display:flex;align-items:center;justify-content:center
}
.icon-btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8}
.icon-btn:hover{border-color:var(--tq-mid);color:var(--tq)}
.icon-btn:disabled{opacity:.35;cursor:not-allowed}

/* fixed call panel block (does not scroll with messages) */
#call-panel{
  flex:0 0 auto;display:none;background:var(--bg1);border-bottom:1px solid var(--tq-low);padding:10px
}
#call-panel.active{display:block}
.call-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.call-tile{position:relative;border:1px solid var(--tq-low);background:#021312;min-height:120px;overflow:hidden}
.call-video{width:100%;height:100%;display:block;object-fit:cover;background:#000}
.call-label{
  position:absolute;left:8px;top:8px;background:rgba(0,0,0,.55);padding:2px 6px;font-size:.6rem;letter-spacing:.1em
}
.call-actions{
  position:absolute;right:8px;top:8px;display:flex;gap:6px
}
.call-actions button{
  border:1px solid var(--tq-low);background:rgba(0,0,0,.55);color:var(--tx0);cursor:pointer;padding:2px 6px
}
.call-tech{
  position:absolute;left:8px;bottom:8px;right:8px;background:rgba(0,0,0,.55);
  border:1px solid rgba(64,224,208,.25);font-size:.58rem;padding:4px;color:var(--tx1);line-height:1.35
}

/* only this scrolls */
#messages{
  flex:1 1 auto;min-height:0;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px
}
.sys-msg{font-size:.68rem;color:var(--tx2)}
.msg-row{display:flex}
.msg-row.mine{justify-content:flex-end}
.msg-bubble{
  max-width:min(80ch,85%);background:var(--bg2);border:1px solid var(--tq-low);padding:8px 10px
}
.msg-row.mine .msg-bubble{border-color:var(--tq-mid);background:#0a1f1c}
.msg-meta{font-size:.58rem;color:var(--tx2);margin-bottom:4px;letter-spacing:.08em}
.msg-text{font-size:.78rem;white-space:pre-wrap;word-break:break-word}
.msg-actions{display:flex;gap:8px;margin-top:8px}
.msg-actions button{border:1px solid var(--tq-mid);background:transparent;color:var(--tq);cursor:pointer;padding:3px 8px;font-size:.66rem}

.transfer{margin-top:6px}
.transfer-bar{height:6px;background:#071a18;border:1px solid var(--tq-low)}
.transfer-fill{height:100%;width:0;background:linear-gradient(90deg,#1a5b55,#40e0d0)}
.transfer-nerd{margin-top:6px;font-size:.62rem;color:var(--tx1)}

.tool-wrap{margin-top:8px;border:1px solid var(--tq-low);background:#071816;padding:8px}
.tool-title{font-size:.64rem;letter-spacing:.14em;color:var(--tq);text-transform:uppercase;margin-bottom:8px}

#input-bar{
  flex:0 0 auto;display:flex;align-items:flex-end;gap:8px;padding:10px;border-top:1px solid var(--tq-low);background:var(--bg1)
}
#file-btn,#send-btn{
  height:34px;min-width:34px;border:1px solid var(--tq-low);background:var(--bg2);cursor:pointer
}
#file-btn:hover,#send-btn:hover{border-color:var(--tq-mid);color:var(--tq)}
#msg-input{
  flex:1;resize:none;max-height:28vh;min-height:34px;border:1px solid var(--tq-low);background:#071715;padding:7px 9px;outline:none
}
#status-bar{
  flex:0 0 auto;border-top:1px solid var(--tq-low);padding:4px 10px;font-size:.62rem;color:var(--tx2);background:#050f0d
}

#plus-menu{
  position:fixed;z-index:70;left:10px;bottom:64px;border:1px solid var(--tq-mid);background:#061513;display:flex;flex-direction:column;min-width:230px
}
#plus-menu.hidden{display:none}
#plus-menu button{
  border:0;border-bottom:1px solid var(--tq-low);background:transparent;color:var(--tx0);text-align:left;padding:9px 10px;cursor:pointer
}
#plus-menu button:last-child{border-bottom:0}
#plus-menu button:hover{background:#0b2220;color:var(--tq)}

#call-incoming{
  position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center
}
#call-incoming.visible{display:flex}
.ci-card{width:min(94vw,420px);border:1px solid var(--tq-mid);background:#071816;padding:14px}
.ci-title{font-size:.64rem;letter-spacing:.2em;text-transform:uppercase;color:var(--tq)}
.ci-name{margin-top:8px;font-size:1rem}
.ci-btns{display:flex;gap:10px;margin-top:12px}
.ci-btns button{flex:1;padding:8px;border:1px solid;cursor:pointer;background:transparent}
.ci-accept{border-color:var(--ok);color:var(--ok)}
.ci-decline{border-color:var(--err);color:var(--err)}

#modal-root{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.65)}
#modal-root.visible{display:flex}
.modal{width:min(92vw,520px);max-height:84vh;overflow:auto;border:1px solid var(--tq-mid);background:#061614;padding:12px}
.modal h3{margin:0 0 10px 0;font-size:.78rem;letter-spacing:.12em;color:var(--tq);text-transform:uppercase}
.modal .row{margin-bottom:9px}
.modal input[type="text"]{width:100%;border:1px solid var(--tq-low);background:#071816;padding:8px}
.modal .check-list{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow:auto;border:1px solid var(--tq-low);padding:8px}
.modal .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:10px}
.modal .actions button{padding:6px 12px;border:1px solid var(--tq-mid);background:transparent;color:var(--tq);cursor:pointer}
.modal .tool-item{border:1px solid var(--tq-low);padding:8px;margin-bottom:8px;cursor:pointer}
.modal .tool-item:hover{border-color:var(--tq-mid);background:#0a2320}

@media (max-width: 760px){
  #sidebar{position:absolute;inset:0 auto 0 0;max-width:100vw;width:100%;z-index:60;transform:translateX(0);transition:transform .2s}
  #sidebar.hidden-mobile{transform:translateX(-100%)}
  #chat-area{position:absolute;inset:0}
  #back-btn{display:inline-block}
}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div id="device-header">
      <div class="wordmark"><span>Turquoise</span><span>mesh</span></div>
      <div id="nick-line">you: <span id="nick-display">...</span></div>
      <div id="full-fp"></div>
    </div>

    <div class="list-block">
      <div class="block-head"><span>Peers</span></div>
      <div id="peer-list"></div>
    </div>

    <div class="list-block">
      <div class="block-head">
        <span>Circles (short mesh)</span>
        <button id="new-circle-btn" class="block-btn">+ circle</button>
      </div>
      <div id="circles-list"></div>
    </div>

    <div id="net-log"></div>
  </aside>

  <main id="chat-area">
    <div id="chat-header">
      <button id="back-btn">←</button>
      <div id="chat-title-wrap">
        <div id="chat-title">Select a peer or circle</div>
        <div id="chat-subtitle">Only messages scroll. Header is fixed.</div>
      </div>
      <div id="chat-actions">
        <button id="walkie-btn" class="icon-btn" title="walkie voice note">
          <svg viewBox="0 0 24 24"><path d="M12 15a3 3 0 0 0 3-3V7a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3Z"/><path d="M19 11a7 7 0 0 1-14 0M12 18v3M8 21h8"/></svg>
        </button>
        <button id="audio-call-btn" class="icon-btn" title="audio call">
          <svg viewBox="0 0 24 24"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.6a2 2 0 0 1-.4 2.1l-1.2 1.2a16 16 0 0 0 6 6l1.2-1.2a2 2 0 0 1 2.1-.4 14 14 0 0 0 2.6.6A2 2 0 0 1 22 16.9Z"/></svg>
        </button>
        <button id="video-call-btn" class="icon-btn" title="video call">
          <svg viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7Z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        </button>
      </div>
    </div>

    <div id="call-panel"></div>

    <div id="messages">
      <div class="sys-msg">no peer selected</div>
    </div>

    <div id="input-bar">
      <button id="file-btn" title="actions">+</button>
      <textarea id="msg-input" rows="1" placeholder="message…"></textarea>
      <button id="send-btn">send</button>
    </div>

    <div id="status-bar">turquoise</div>
  </main>
</div>

<div id="plus-menu" class="hidden">
  <button data-plus="file">Share file(s)</button>
  <button data-plus="tool">Start game / tool</button>
  <button data-plus="circle">Create short mesh circle</button>
</div>

<div id="call-incoming"></div>
<div id="modal-root"></div>

<input type="file" id="__file-input" multiple hidden>
<script type="module" src="/main.js"></script>
</body>
</html>
