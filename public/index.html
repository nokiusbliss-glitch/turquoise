<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#040a09">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Turquoise</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<input type="file" id="__file-input" style="display:none" multiple>
<style>
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  -webkit-text-size-adjust:100%;
}
button,input,textarea{font:inherit;border:none;background:none;color:inherit;outline:none}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--tq-low)}

/* ── Design tokens (golden ratio φ=1.618) ────────────────────────────── */
:root{
  --bg0:#040a09;--bg1:#081210;--bg2:#0c1916;--bg3:#112019;--bg4:#162820;
  --tq:#40e0d0;--tq-mid:#1e7068;--tq-low:#0d3530;
  --tx0:#c4e8e4;--tx1:#7ab8b2;--tx2:#3d7a74;--tx3:#1d4440;
  --err:#e05040;--ok:#40d090;--warn:#d09040;
  /* Spacing: base=7px, each step ×φ */
  --sp1:.25rem;--sp2:.4375rem;--sp3:.6875rem;--sp4:1.125rem;--sp5:1.8125rem;--sp6:2.9375rem;
  /* Component heights */
  --header-h:3.236rem;   /* fixed chrome */
  --input-h:2.618rem;    /* text input + buttons */
  --btn-h:2.236rem;      /* icon buttons in header */
  --status-h:1.618rem;   /* status bar text */
  --safe-b:max(env(safe-area-inset-bottom,0px),12px);
  font-family:'DM Mono','JetBrains Mono','Fira Mono',ui-monospace,monospace;
  font-size:13px;line-height:1.618;
  -webkit-font-smoothing:antialiased;
  color:var(--tx0);background:var(--bg0);
}

/* ── App shell ───────────────────────────────────────────────────────── */
body{background:var(--bg0)}
#app{display:flex;width:100vw;height:100vh;height:100dvh;overflow:hidden;position:relative}

/* ════════════════════════════════════════════════════════════════════════
   SIDEBAR — fixed column, only peer-list scrolls
   ════════════════════════════════════════════════════════════════════════ */
#sidebar{
  width:38.2%;min-width:260px;max-width:400px;height:100%;
  display:flex;flex-direction:column;
  background:var(--bg1);border-right:1px solid var(--tq-low);
  flex-shrink:0;overflow:hidden;z-index:2;
  transition:transform .18s ease;
}
#device-header{flex-shrink:0;padding:var(--sp4) var(--sp4) var(--sp3);border-bottom:1px solid var(--tq-low)}
.wordmark{display:flex;align-items:center;justify-content:space-between;font-size:.625rem;font-weight:500;letter-spacing:.35em;text-transform:uppercase;color:var(--tq);margin-bottom:var(--sp3)}
.wordmark-text{flex:1}
#reset-btn{font-size:.55rem;letter-spacing:.1em;color:var(--tx3);cursor:pointer;padding:var(--sp1) var(--sp2);border:1px solid var(--tx3);transition:color .15s,border-color .15s;flex-shrink:0}
#reset-btn:hover{color:var(--err);border-color:var(--err)}
.identity-row{display:flex;align-items:center;gap:var(--sp2);cursor:pointer;padding:var(--sp2);border:1px solid transparent;transition:border-color .15s}
.identity-row:hover{border-color:var(--tq-mid)}
.identity-row:hover .edit-hint{opacity:1}
.nick-display{font-size:1rem;font-weight:500;letter-spacing:.04em;color:var(--tx0);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nick-input{font-size:16px;font-weight:500;letter-spacing:.04em;color:var(--tq);flex:1;background:transparent;border-bottom:1px solid var(--tq);display:none;padding-bottom:1px}
.nick-input.visible{display:block}
.nick-display.hidden{display:none}
.edit-hint{font-size:.6rem;color:var(--tx2);opacity:0;transition:opacity .15s;white-space:nowrap;flex-shrink:0}
.full-fp{font-size:.58rem;color:var(--tx3);letter-spacing:.04em;margin-top:var(--sp1);font-weight:300;word-break:break-all}

/* Peer list — the only scrollable element in the sidebar */
#peer-list{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:var(--sp1) 0}
#no-peers{padding:var(--sp4);color:var(--tx2);font-size:.75rem;letter-spacing:.06em}

.peer-tile{display:flex;align-items:center;gap:var(--sp3);padding:var(--sp3) var(--sp4);cursor:pointer;border-left:2px solid transparent;transition:background .1s,border-color .1s;user-select:none}
.peer-tile:hover{background:var(--bg3)}
.peer-tile.active{background:var(--bg3);border-left-color:var(--tq)}
.mesh-icon{font-size:1rem;line-height:1;width:16px;text-align:center;color:var(--tx3);flex-shrink:0;transition:color .2s}
.mesh-icon.online{color:var(--tq)}
.mesh-icon-hdr{font-size:1rem;color:var(--tq);flex-shrink:0;line-height:1;margin-right:var(--sp1)}
.mesh-toggle{font-size:.8rem;color:var(--tq-mid);cursor:pointer;flex-shrink:0;padding:var(--sp1) var(--sp2);border:1px solid transparent;opacity:.3;transition:opacity .12s,color .12s,border-color .12s}
.peer-tile:hover .mesh-toggle{opacity:.8}
.mesh-toggle:hover{border-color:var(--tq-mid);opacity:1}
.mesh-toggle.blocked{color:var(--tx3);opacity:.25}
.mesh-toggle.blocked:hover{color:var(--err);border-color:var(--err);opacity:1}
.peer-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:background .3s}
.peer-dot.online{background:var(--tq)}
.peer-dot.offline{background:var(--tx3)}
.peer-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.peer-nick{font-size:.82rem;font-weight:500;color:var(--tx0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.peer-preview{font-size:.68rem;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.peer-badge{background:var(--tq);color:var(--bg0);font-size:.58rem;font-weight:500;min-width:1.2rem;height:1.2rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0 var(--sp1)}
.peer-badge.call-badge{background:var(--tq-low);color:var(--tq);border:1px solid var(--tq-mid);font-size:.8rem}
#net-log{flex-shrink:0;max-height:5rem;overflow-y:auto;border-top:1px solid var(--tq-low);padding:var(--sp2) var(--sp3);padding-bottom:calc(var(--sp2) + var(--safe-b))}
#net-log .entry{font-size:.58rem;color:var(--tx2);padding:1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#net-log .entry.err{color:var(--err)}

/* ════════════════════════════════════════════════════════════════════════
   CHAT AREA — strict flex column
   ONLY #messages is scrollable. Everything else: flex-shrink:0.

   Structure (top→bottom, all fixed except messages):
   ┌─────────────────────┐
   │  #chat-header       │ ← flex-shrink:0  ALWAYS VISIBLE, NEVER SCROLLS
   ├─────────────────────┤
   │  #call-panel        │ ← flex-shrink:0  1:1 call (conditionally shown)
   ├─────────────────────┤
   │  #mesh-call-panel   │ ← flex-shrink:0  mesh call (conditionally shown)
   ├─────────────────────┤
   │  #messages          │ ← flex:1 min-height:0  ONLY SCROLLABLE ELEMENT
   ├─────────────────────┤
   │  #input-bar         │ ← flex-shrink:0
   ├─────────────────────┤
   │  #status-bar        │ ← flex-shrink:0  ALWAYS VISIBLE, NEVER HIDDEN
   └─────────────────────┘

   Key: min-height:0 on #messages is required — without it a flex child
   refuses to shrink below its content height, causing the whole page to scroll.
   ════════════════════════════════════════════════════════════════════════ */
#chat-area{
  flex:1;min-width:0;height:100%;
  display:flex;flex-direction:column;
  overflow:hidden; /* critical: clips children, prevents body scroll */
  background:var(--bg2);position:relative;
}
#chat-area.drag-over::after{content:'drop to send';position:absolute;inset:0;z-index:10;background:color-mix(in srgb,var(--tq) 8%,transparent);border:2px solid var(--tq);display:flex;align-items:center;justify-content:center;font-size:1.618rem;color:var(--tq);letter-spacing:.2em}

/* ── Chat header — FIXED, never scrolls ─────────────────────────────── */
#chat-header{
  flex-shrink:0;          /* does NOT grow or shrink */
  height:var(--header-h);
  display:flex;align-items:center;
  padding:0 var(--sp4);gap:var(--sp3);
  background:var(--bg1);
  border-bottom:1px solid var(--tq-low);
  box-shadow:0 1px 0 color-mix(in srgb,var(--tq) 5%,transparent);
  z-index:1;              /* stays above message list */
}
#chat-placeholder{color:var(--tx2);font-size:.75rem;letter-spacing:.1em}
.chat-peer-info{display:flex;flex-direction:column;flex:1;min-width:0}
.chat-peer-name{font-size:.9rem;font-weight:500;color:var(--tx0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-peer-fp{font-size:.56rem;color:var(--tx3);letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-actions{display:flex;gap:var(--sp2);align-items:center;flex-shrink:0}
/* Action buttons — square at --btn-h */
.action-btn{width:var(--btn-h);height:var(--btn-h);display:flex;align-items:center;justify-content:center;color:var(--tx2);cursor:pointer;border:1px solid transparent;font-size:.9rem;transition:color .12s,border-color .12s,background .12s;flex-shrink:0}
.action-btn:hover{color:var(--tq);border-color:var(--tq-mid)}
.action-btn.active-call{color:var(--tq);border-color:var(--tq);background:var(--tq-low)}
.action-btn.danger:hover{color:var(--err);border-color:var(--err)}

/* ── Call panels — FIXED below header ──────────────────────────────── */
#call-panel,#mesh-call-panel{
  flex-shrink:0;
  display:none;flex-direction:column;align-items:center;
  gap:var(--sp4);padding:var(--sp4) var(--sp5);
  background:var(--bg1);border-bottom:1px solid var(--tq-low);
}
#call-panel.visible,#mesh-call-panel.visible{display:flex}

.call-waiting{display:flex;flex-direction:column;align-items:center;gap:var(--sp3)}
.call-type-badge{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--tq)}
.call-state{font-size:.82rem;color:var(--tx0)}
.walkie-active{font-size:.82rem;color:var(--tq);letter-spacing:.08em;padding:var(--sp2) var(--sp4);border:1px solid var(--tq-mid);background:var(--tq-low);animation:wk-pulse 2s ease-in-out infinite}
.walkie-peer{font-weight:500}
@keyframes wk-pulse{0%,100%{opacity:.65}50%{opacity:1}}
.video-grid{display:flex;gap:var(--sp3);width:100%;max-height:36vh;flex-wrap:wrap}
.video-wrap{flex:1;min-width:120px;position:relative;background:var(--bg0);border:1px solid var(--tq-low);overflow:hidden}
.video-wrap video{width:100%;height:100%;object-fit:cover}
.video-label{position:absolute;bottom:var(--sp2);left:var(--sp2);font-size:.58rem;color:var(--tx1);background:color-mix(in srgb,var(--bg0) 72%,transparent);padding:2px 6px;letter-spacing:.06em}
.video-wrap.local{max-width:120px;max-height:90px;flex:none}
.call-controls{display:flex;gap:var(--sp3);flex-wrap:wrap;justify-content:center}
/* Call buttons — same height as input bar */
.call-btn{height:var(--input-h);padding:0 var(--sp4);display:inline-flex;align-items:center;justify-content:center;gap:var(--sp2);border:1px solid var(--tq-mid);color:var(--tx0);cursor:pointer;font-size:.75rem;letter-spacing:.06em;white-space:nowrap;transition:all .12s}
.call-btn:hover{background:var(--bg4)}
.call-btn.muted{color:var(--err);border-color:var(--err)}
.call-btn.end{background:var(--err);border-color:var(--err);color:#fff}
.call-btn.end:hover{filter:brightness(.85)}

/* ── Messages — THE ONLY SCROLLABLE ELEMENT ─────────────────────────── */
#messages{
  flex:1;        /* fills ALL remaining vertical space */
  min-height:0;  /* CRITICAL: allows flex child to shrink below content */
  overflow-y:auto;overflow-x:hidden;
  padding:var(--sp4);
  display:flex;flex-direction:column;gap:var(--sp3);
}
.sys-msg{font-size:.68rem;color:var(--tx2);text-align:center;letter-spacing:.06em;padding:var(--sp2)}
.sys-msg.err{color:var(--err)}
.msg{display:flex;flex-direction:column;max-width:72%;gap:var(--sp1)}
.msg.own{align-self:flex-end;align-items:flex-end}
.msg.peer{align-self:flex-start;align-items:flex-start}
.meta{font-size:.58rem;color:var(--tx2);letter-spacing:.04em;padding:0 var(--sp1)}
.bubble{padding:var(--sp3) var(--sp4);font-size:.82rem;line-height:1.618;white-space:pre-wrap;word-break:break-word}
.msg.own .bubble{background:var(--tq-low);border:1px solid var(--tq-mid);color:var(--tx0)}
.msg.peer .bubble{background:var(--bg3);border:1px solid var(--tx3);color:var(--tx0)}
.file-card{padding:var(--sp3) var(--sp4);border:1px solid var(--tq-mid);background:var(--tq-low);min-width:200px;max-width:280px;display:flex;flex-direction:column;gap:var(--sp2)}
.msg.peer .file-card{border-color:var(--tx3);background:var(--bg3)}
.file-name{font-size:.78rem;color:var(--tx0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-size{font-size:.62rem;color:var(--tx2)}
.file-err{font-size:.65rem;color:var(--err)}
.prog-track{height:2px;background:var(--tx3);overflow:hidden}
.prog-fill{height:100%;background:var(--tq);transition:width .06s linear;will-change:width}
.dl-btn{display:inline-flex;align-items:center;gap:var(--sp1);font-size:.68rem;color:var(--tq);letter-spacing:.06em;cursor:pointer;border:1px solid var(--tq-mid);padding:var(--sp1) var(--sp3);transition:all .12s}
.dl-btn:hover{background:var(--tq);color:var(--bg0)}

/* ── Input bar — FIXED ───────────────────────────────────────────────── */
#input-bar{flex-shrink:0;display:none;align-items:flex-end;gap:var(--sp2);padding:var(--sp2) var(--sp3);background:var(--bg1);border-top:1px solid var(--tq-low)}
#input-bar.visible{display:flex}
/* File attach — square at input-h */
#file-btn{width:var(--input-h);height:var(--input-h);display:flex;align-items:center;justify-content:center;color:var(--tx2);cursor:pointer;border:1px solid var(--tx3);font-size:1.2rem;flex-shrink:0;align-self:flex-end;transition:color .12s,border-color .12s}
#file-btn:hover{color:var(--tq);border-color:var(--tq)}
/* Textarea — 16px prevents iOS auto-zoom */
#msg-input{flex:1;resize:none;background:var(--bg3);border:1px solid var(--tx3);color:var(--tx0);padding:calc((var(--input-h) - 1.618rem) / 2) var(--sp3);font-size:16px;line-height:1.618;min-height:var(--input-h);max-height:calc(var(--input-h)*3);overflow-y:auto;transition:border-color .12s}
#msg-input:focus{border-color:var(--tq-mid)}
#msg-input::placeholder{color:var(--tx3)}
/* Send — same height as input */
#send-btn{height:var(--input-h);padding:0 var(--sp4);background:var(--tq-low);border:1px solid var(--tq-mid);color:var(--tq);cursor:pointer;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;transition:all .12s;flex-shrink:0;align-self:flex-end;white-space:nowrap}
#send-btn:hover{background:var(--tq);color:var(--bg0)}

/* ── Status bar — ALWAYS VISIBLE, always at bottom ──────────────────── */
#status-bar{
  flex-shrink:0;
  height:calc(var(--status-h) + var(--sp2)*2 + var(--safe-b));
  padding:var(--sp2) var(--sp4);
  padding-bottom:calc(var(--sp2) + var(--safe-b));
  font-size:.62rem;letter-spacing:.06em;
  background:var(--bg0);border-top:1px solid var(--tq-low);
  color:var(--tx3); /* neutral when idle */
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
  transition:color .2s;
}
#status-bar.s-ok{color:var(--ok)}
#status-bar.s-err{color:var(--err)}
#status-bar.s-warn{color:var(--warn)}
#status-bar.s-info{color:var(--tx1)}

/* ── Incoming call overlay ───────────────────────────────────────────── */
#call-incoming{display:none;position:fixed;inset:0;z-index:200;background:color-mix(in srgb,var(--bg0) 88%,transparent);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);flex-direction:column;align-items:center;justify-content:center;gap:var(--sp3)}
#call-incoming.visible{display:flex}
.ci-icon{font-size:2.618rem;animation:ci-pulse .9s ease-in-out infinite}
@keyframes ci-pulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.1);opacity:1}}
.ci-mesh{font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;color:var(--tq);border:1px solid var(--tq-mid);padding:var(--sp1) var(--sp3);background:var(--tq-low)}
.ci-label{font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--tq)}
.ci-name{font-size:1.618rem;font-weight:500;color:var(--tx0);letter-spacing:.04em}
.ci-sub{font-size:.72rem;color:var(--tx2);letter-spacing:.08em}
.ci-btns{display:flex;gap:var(--sp5);margin-top:var(--sp3)}
.ci-btn{height:var(--sp6);padding:0 var(--sp5);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;border:1px solid;transition:all .15s;min-width:120px}
.ci-btn.accept{border-color:var(--ok);color:var(--ok)}
.ci-btn.accept:hover{background:var(--ok);color:var(--bg0)}
.ci-btn.decline{border-color:var(--err);color:var(--err)}
.ci-btn.decline:hover{background:var(--err);color:#fff}

/* ── Back button (mobile) ───────────────────────────────────────────── */
#back-btn{display:none;width:var(--btn-h);height:var(--btn-h);align-items:center;justify-content:center;color:var(--tx1);cursor:pointer;font-size:1.1rem;margin-right:var(--sp1);transition:color .12s;flex-shrink:0}
#back-btn:hover{color:var(--tq)}

/* ── Responsive: ≤680px one panel at a time ──────────────────────────── */
@media(max-width:680px){
  #sidebar{position:absolute;top:0;left:0;bottom:0;width:100%!important;max-width:100%!important;transform:translateX(0)}
  #sidebar.slide-left{transform:translateX(-100%)}
  #chat-area{position:absolute;inset:0;transform:translateX(100%)}
  #chat-area.slide-in{transform:translateX(0)}
  #sidebar,#chat-area{transition:transform .2s ease}
  #back-btn{display:flex!important}
  .chat-peer-fp{display:none}
  .video-wrap.local{max-width:72px;max-height:54px}
}
</style>
</head>
<body>
<div id="app">

  <aside id="sidebar">
    <div id="device-header">
      <div class="wordmark">
        <span class="wordmark-text">Turquoise</span>
        <div id="reset-btn" title="reset identity — wipes all data">reset</div>
      </div>
      <div class="identity-row" id="identity-row" title="tap to edit name">
        <span class="nick-display" id="nick-display"></span>
        <input class="nick-input" id="nick-input" maxlength="32" autocomplete="off" spellcheck="false" placeholder="your name…">
        <span class="edit-hint">edit</span>
      </div>
      <div class="full-fp" id="full-fp"></div>
    </div>
    <div id="peer-list"></div>
    <div id="net-log"></div>
  </aside>

  <main id="chat-area">
    <!-- FIXED: never scrolls -->
    <div id="chat-header">
      <span id="back-btn">←</span>
      <span id="chat-placeholder">select a peer</span>
    </div>

    <!-- FIXED: 1:1 call panel, shown only when active -->
    <div id="call-panel"></div>

    <!-- FIXED: mesh call panel, shown only when active -->
    <div id="mesh-call-panel"></div>

    <!-- SCROLLABLE: the only element that scrolls -->
    <div id="messages">
      <div class="sys-msg">no peer selected</div>
    </div>

    <!-- FIXED: message input -->
    <div id="input-bar">
      <button id="file-btn" title="attach file">+</button>
      <textarea id="msg-input" placeholder="message…" rows="1"></textarea>
      <button id="send-btn">send</button>
    </div>

    <!-- FIXED: status bar, always visible -->
    <div id="status-bar">turquoise</div>
  </main>

</div>

<!-- Incoming call overlay -->
<div id="call-incoming"></div>

<script type="module" src="/main.js"></script>
</body>
</html>
