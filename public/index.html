<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<meta name="theme-color" content="#040a09">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Turquoise</title>

<style>

/* ---------- GLOBAL ---------- */

html{
touch-action:manipulation;
}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu;
background:#040a09;
color:#7fffd4;
overflow:hidden;
}

/* ---------- APP LAYOUT ---------- */

#app{
display:flex;
height:100vh;
}

/* ---------- SIDEBAR ---------- */

#sidebar{
width:220px;
background:#020706;
border-right:1px solid #003b33;
display:flex;
flex-direction:column;
}

#sidebar-header{
padding:10px;
border-bottom:1px solid #003b33;
}

#peer-list{
flex:1;
overflow:auto;
}

.peer{
padding:10px;
cursor:pointer;
border-bottom:1px solid #002822;
}

.peer:hover{
background:#002822;
}

/* ---------- MAIN ---------- */

#main{
flex:1;
display:flex;
flex-direction:column;
}

/* ---------- CHAT AREA ---------- */

#chat-area{
flex:1;
overflow-y:auto;
padding:12px;
scroll-behavior:smooth;
overscroll-behavior:contain;
}

/* ---------- MESSAGE ---------- */

.msg{
margin-bottom:12px;
max-width:70%;
padding:10px;
border-radius:8px;
background:#022c26;
word-break:break-word;
animation:fadein .25s ease;
user-select:text;
will-change:transform,opacity;
}

.msg.self{
background:#014d43;
margin-left:auto;
}

@keyframes fadein{
from{
opacity:0;
transform:translateY(5px);
}
to{
opacity:1;
transform:none;
}
}

/* ---------- FILE / FOLDER ---------- */

.file-card,
.folder-card{
border:1px solid #004c43;
padding:8px;
margin-top:6px;
border-radius:6px;
background:#011d1a;
will-change:transform,opacity;
}

/* ---------- COMPOSE AREA ---------- */

#compose-area{
display:flex;
align-items:center;
padding:8px;
gap:6px;
border-top:1px solid #003b33;
clip-path:polygon(0 5px,5px 0,100% 0,100% 100%,0 100%);
overflow:visible;
}

#msg-input{
flex:1;
resize:none;
border:none;
outline:none;
background:#011513;
color:#7fffd4;
padding:8px;
border-radius:6px;
max-height:120px;
overflow-y:auto;
}

/* ---------- BUTTONS ---------- */

button{
background:#003b33;
border:none;
color:#7fffd4;
padding:8px 10px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#005f55;
}

/* ---------- PLUS MENU ---------- */

#plus-menu{
position:absolute;
bottom:50px;
left:10px;
background:#011d1a;
border:1px solid #004c43;
border-radius:6px;
display:none;
flex-direction:column;
z-index:50;
}

#plus-menu button{
width:150px;
text-align:left;
background:none;
border:none;
padding:10px;
}

#plus-menu button:hover{
background:#003b33;
}

/* ---------- STATUS ---------- */

#status-line{
padding:4px 10px;
font-size:12px;
border-top:1px solid #003b33;
min-height:18px;
}

/* ---------- CALL PANEL ---------- */

#call-panel{
position:fixed;
bottom:0;
left:220px;
right:0;
height:200px;
background:#011513;
border-top:1px solid #003b33;
display:none;
flex-wrap:wrap;
padding:8px;
gap:10px;
overflow:auto;
}

.call-video-tile{
background:#000;
width:300px;
aspect-ratio:16/9;
border-radius:6px;
overflow:hidden;
position:relative;
}

.call-video-tile video{
width:100%;
height:100%;
object-fit:cover;
}

/* ---------- PIP ---------- */

.call-pip{
position:fixed;
bottom:16px;
right:16px;
width:180px;
aspect-ratio:16/9;
background:#000;
border-radius:8px;
overflow:hidden;
z-index:40;
}

/* ---------- MOBILE ---------- */

@media(max-width:600px){

#sidebar{
display:none;
}

#sidebar.show{
display:flex;
position:fixed;
top:44px;
bottom:0;
left:0;
width:220px;
z-index:50;
}

#call-panel{
left:0;
}

.call-video-tile{
width:100%;
}

}

</style>

</head>

<body>

<div id="app">

<!-- SIDEBAR -->

<div id="sidebar">

<div id="sidebar-header">
<strong>Peers</strong>
</div>

<div id="peer-list"></div>

</div>


<!-- MAIN -->

<div id="main">

<div id="chat-area"></div>


<!-- COMPOSE -->

<div id="compose-area">

<button id="plus-btn">+</button>

<textarea
id="msg-input"
rows="1"
placeholder="transmit…"
spellcheck="false"></textarea>

<button id="send-btn">Send</button>

</div>

<div id="plus-menu">

<button id="send-file">Send File</button>
<button id="send-folder">Send Folder</button>
<button id="start-call">Start Call</button>

</div>

<div id="status-line"></div>

</div>

</div>


<!-- CALL PANEL -->

<div id="call-panel"></div>


<script type="module">

const plusBtn=document.getElementById('plus-btn')
const plusMenu=document.getElementById('plus-menu')

plusBtn.onclick=()=>{
plusMenu.style.display=
plusMenu.style.display==='flex'
?'none':'flex'
}

document.addEventListener('click',e=>{
if(!plusMenu.contains(e.target)&&e.target!==plusBtn)
plusMenu.style.display='none'
})

const textarea=document.getElementById('msg-input')

textarea.addEventListener('input',()=>{
textarea.style.height='auto'
textarea.style.height=textarea.scrollHeight+'px'
})

</script>

</body>
</html>
