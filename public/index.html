<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#060b0b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Turquoise</title>
<link rel="manifest" href="manifest.json" />
<style>
/* ═══════════════════════════════════════════════════════════════
   TURQUOISE DESIGN SYSTEM
   φ = 1.618 (golden ratio)
   One accent: #40E0D0 (turquoise)
   Font: monospace only
   Corners: 2px (minimal radius)
   ═══════════════════════════════════════════════════════════════ */

:root {
  /* Backgrounds — pure dark progression */
  --bg-0:    #060b0b;
  --bg-1:    #091111;
  --bg-2:    #0d1818;
  --bg-3:    #121e1e;
  --bg-4:    #172424;

  /* Accent */
  --tq:      #40E0D0;
  --tq-dim:  #2aaa9e;
  --tq-muted:#1a6661;

  /* Semantic */
  --ok:      #3dbf7a;
  --danger:  #d95040;
  --warn:    #d9a040;

  /* Text */
  --t1:      #e8f4f2;
  --t2:      #8ab8b2;
  --t3:      #4a7a74;

  /* Golden ratio spacing */
  --sp-xs:   0.25rem;
  --sp-s:    0.5rem;
  --sp-m:    1rem;
  --sp-l:    1.618rem;
  --sp-xl:   2.618rem;

  /* φ layout */
  --sidebar-w:  38.2%;   /* φ⁻¹ */
  --chat-w:     61.8%;   /* φ   */
  --header-h:   3.236rem;/* φ²  */
  --input-h:    3.6rem;
  --mobile-nav: 4rem;

  --font: 'Courier New', 'Consolas', 'Lucida Console', monospace;
  --radius: 2px;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg-0);
  color: var(--t1);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── LAYOUT ───────────────────────────────────────────────────── */

#app {
  display: flex;
  height: 100dvh; /* dynamic viewport height — handles iOS toolbar */
  overflow: hidden;
}

/* ── SIDEBAR ──────────────────────────────────────────────────── */

#sidebar {
  width: var(--sidebar-w);
  min-width: 220px;
  max-width: 320px;
  height: 100%;
  background: var(--bg-1);
  border-right: 1px solid var(--bg-3);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
  transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 100;
}

/* ── DEVICE HEADER ────────────────────────────────────────────── */

#device-header {
  padding: var(--sp-m);
  border-bottom: 1px solid var(--bg-3);
  flex-shrink: 0;
}

.wordmark {
  font-size: 0.65rem;
  letter-spacing: 0.5em;
  color: var(--tq);
  text-transform: uppercase;
  margin-bottom: var(--sp-s);
}

#nickname-display {
  display: flex;
  align-items: center;
  gap: var(--sp-xs);
  cursor: pointer;
  padding: var(--sp-xs) 0;
}
#nickname-display:hover .edit-icon { opacity: 1; }
.edit-icon { color: var(--t3); font-size: 0.75rem; opacity: 0; transition: opacity .2s; }
.name { font-size: 0.9rem; color: var(--t1); font-weight: normal; }

#nickname-input {
  display: none;
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--tq-muted);
  color: var(--t1);
  font-family: var(--font);
  font-size: 0.9rem;
  padding: var(--sp-xs) var(--sp-s);
  border-radius: var(--radius);
  outline: none;
}
#nickname-input:focus { border-color: var(--tq); }

.fp-short {
  font-size: 0.62rem;
  color: var(--t3);
  letter-spacing: 0.05em;
  margin-top: var(--sp-xs);
  word-break: break-all;
}

#status-row {
  display: flex;
  align-items: center;
  gap: var(--sp-s);
  margin-top: var(--sp-s);
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.connected    { background: var(--ok); }
.status-dot.connecting   { background: var(--warn); animation: pulse 1.2s infinite; }
.status-dot.disconnected { background: var(--t3); }
.status-dot.online  { background: var(--ok); }
.status-dot.offline { background: var(--t3); }

@keyframes pulse {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.3; }
}

#status-text { font-size: 0.72rem; color: var(--t2); letter-spacing: 0.1em; }

/* ── MODE TOGGLE ──────────────────────────────────────────────── */

#mode-toggle {
  display: flex;
  margin-top: var(--sp-s);
  border: 1px solid var(--bg-3);
  border-radius: var(--radius);
  overflow: hidden;
  flex-shrink: 0;
}

.mode-btn {
  flex: 1;
  padding: var(--sp-xs) var(--sp-s);
  background: transparent;
  border: none;
  color: var(--t3);
  font-family: var(--font);
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: background .15s, color .15s;
  text-align: center;
}
.mode-btn.active {
  background: var(--bg-3);
  color: var(--tq);
}
.mode-btn:hover:not(.active) { background: var(--bg-2); color: var(--t2); }

/* ── PROPAGATION URL ──────────────────────────────────────────── */

#propagation-banner {
  display: none;
  padding: var(--sp-s) var(--sp-m);
  background: var(--bg-2);
  border-bottom: 1px solid var(--bg-3);
  font-size: 0.65rem;
  color: var(--t3);
}
#propagation-banner.visible { display: block; }
#propagation-url {
  color: var(--tq);
  word-break: break-all;
  margin-top: var(--sp-xs);
}

/* ── PEER LIST ────────────────────────────────────────────────── */

#peer-list {
  flex: 1;
  overflow-y: auto;
  padding: var(--sp-s) 0;
}

.no-peers {
  padding: var(--sp-l);
  font-size: 0.72rem;
  color: var(--t3);
  text-align: center;
  line-height: 1.8;
}

.peer-tile {
  display: flex;
  align-items: center;
  gap: var(--sp-s);
  padding: var(--sp-s) var(--sp-m);
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  transition: background .12s;
  min-height: 3.6rem;
}
.peer-tile:hover  { background: var(--bg-2); }
.peer-tile.active { background: var(--bg-3); border-left: 2px solid var(--tq); }

.peer-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.peer-dot.online  { background: var(--ok); }
.peer-dot.offline { background: var(--t3); }
.peer-dot.lan     { background: var(--tq); }

.peer-info { flex: 1; min-width: 0; }
.peer-name {
  font-size: 0.8rem;
  color: var(--t1);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.peer-fp-short { font-size: 0.62rem; color: var(--t3); }
.peer-preview {
  font-size: 0.7rem;
  color: var(--t3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.peer-actions { display: flex; align-items: center; gap: var(--sp-xs); flex-shrink: 0; }
.peer-action-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 0.85rem;
  padding: var(--sp-xs);
  border-radius: var(--radius);
  opacity: 0.6;
  transition: opacity .15s;
}
.peer-action-btn:hover { opacity: 1; }

.peer-badge {
  background: var(--danger);
  color: white;
  font-size: 0.6rem;
  border-radius: 10px;
  padding: 1px 5px;
  min-width: 16px;
  text-align: center;
}

/* ── NET LOG ──────────────────────────────────────────────────── */

#net-log {
  height: 80px;
  overflow-y: auto;
  padding: var(--sp-s) var(--sp-m);
  border-top: 1px solid var(--bg-3);
  flex-shrink: 0;
}
.net-entry {
  font-size: 0.62rem;
  color: var(--t3);
  line-height: 1.4;
}
.net-entry.err { color: var(--danger); }

/* ── MAIN CHAT AREA ───────────────────────────────────────────── */

#chat-area {
  flex: 1;
  min-width: 0;
  height: 100%;
  display: flex;
  flex-direction: column;
  background: var(--bg-0);
  position: relative;
}

/* ── CHAT HEADER ──────────────────────────────────────────────── */

#chat-header {
  height: var(--header-h);
  padding: 0 var(--sp-m);
  border-bottom: 1px solid var(--bg-2);
  display: flex;
  align-items: center;
  gap: var(--sp-s);
  flex-shrink: 0;
  background: var(--bg-1);
}

#mobile-back {
  display: none;
  background: none;
  border: none;
  color: var(--tq);
  font-size: 1.4rem;
  cursor: pointer;
  padding: var(--sp-xs);
  line-height: 1;
}

.peer-name { font-size: 0.85rem; color: var(--t1); }
.peer-fp-s  { font-size: 0.62rem; color: var(--t3); }

#chat-header-actions {
  display: flex;
  gap: var(--sp-xs);
  margin-left: auto;
  flex-shrink: 0;
}

.call-btn {
  background: var(--bg-3);
  border: 1px solid var(--bg-4);
  color: var(--t2);
  font-family: var(--font);
  font-size: 0.7rem;
  padding: var(--sp-xs) var(--sp-s);
  cursor: pointer;
  border-radius: var(--radius);
  transition: background .15s, color .15s;
  letter-spacing: 0.05em;
}
.call-btn:hover  { background: var(--bg-4); color: var(--t1); }
.call-btn.active { background: var(--tq-muted); color: var(--tq); }
.call-btn.danger { color: var(--danger); border-color: var(--danger); }
.call-btn.danger:hover { background: var(--danger); color: white; }

/* ── CALL OVERLAY ─────────────────────────────────────────────── */

#call-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: #000;
  z-index: 200;
  flex-direction: column;
}
#call-overlay.visible { display: flex; }

#remote-video {
  flex: 1;
  width: 100%;
  object-fit: cover;
  background: #111;
}
#local-video {
  position: absolute;
  top: var(--sp-m);
  right: var(--sp-m);
  width: 100px;
  height: 140px;
  object-fit: cover;
  border: 1px solid var(--bg-3);
  border-radius: var(--radius);
  background: #222;
}
.call-controls {
  padding: var(--sp-m);
  display: flex;
  justify-content: center;
  gap: var(--sp-m);
  background: rgba(0,0,0,0.7);
}

/* ── INCOMING CALL ────────────────────────────────────────────── */

#incoming-call {
  position: absolute;
  top: var(--header-h);
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-2);
  border: 1px solid var(--bg-4);
  padding: var(--sp-m);
  z-index: 150;
  font-size: 0.8rem;
  text-align: center;
  min-width: 220px;
  border-radius: var(--radius);
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

/* ── MESSAGES ─────────────────────────────────────────────────── */

#messages {
  flex: 1;
  overflow-y: auto;
  padding: var(--sp-m);
  display: flex;
  flex-direction: column;
  gap: var(--sp-s);
  overscroll-behavior: contain;
}

.msg {
  max-width: 75%;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.msg.own  { align-self: flex-end; align-items: flex-end; }
.msg.peer { align-self: flex-start; align-items: flex-start; }

.meta { font-size: 0.62rem; color: var(--t3); letter-spacing: 0.05em; }

.bubble {
  padding: var(--sp-s) var(--sp-m);
  background: var(--bg-2);
  border-radius: var(--radius);
  font-size: 0.82rem;
  line-height: 1.5;
  word-break: break-word;
  white-space: pre-wrap;
  color: var(--t1);
}
.msg.own  .bubble { background: var(--bg-3); border-left: 2px solid var(--tq-muted); }
.msg.peer .bubble { border-left: 2px solid var(--bg-4); }

.sys-msg {
  align-self: center;
  font-size: 0.68rem;
  color: var(--t3);
  padding: var(--sp-xs) var(--sp-m);
  background: var(--bg-1);
  border-radius: 10px;
}
.sys-msg.err { color: var(--danger); }

.empty-state {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  color: var(--t3);
  letter-spacing: 0.1em;
}

/* ── FILE CARDS ───────────────────────────────────────────────── */

.file-card {
  background: var(--bg-2);
  border: 1px solid var(--bg-3);
  padding: var(--sp-s) var(--sp-m);
  border-radius: var(--radius);
  min-width: 200px;
  max-width: 280px;
}
.f-name {
  font-size: 0.78rem;
  color: var(--t1);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 2px;
}
.f-meta { font-size: 0.65rem; color: var(--t3); margin-bottom: var(--sp-xs); }
.prog-track {
  height: 3px;
  background: var(--bg-4);
  border-radius: 2px;
  overflow: hidden;
  margin-top: var(--sp-xs);
}
.prog-fill {
  height: 100%;
  background: var(--tq);
  transition: width .15s ease;
  border-radius: 2px;
}
.dl-btn {
  display: inline-block;
  margin-top: var(--sp-s);
  font-size: 0.72rem;
  color: var(--tq);
  text-decoration: none;
  padding: 2px var(--sp-s);
  border: 1px solid var(--tq-muted);
  border-radius: var(--radius);
  font-family: var(--font);
  letter-spacing: 0.05em;
}
.dl-btn:hover { background: var(--bg-3); }

/* TCP speed badge */
.tcp-badge {
  font-size: 0.6rem;
  color: var(--tq);
  letter-spacing: 0.1em;
  margin-left: var(--sp-xs);
  opacity: 0.7;
}

/* ── INPUT BAR ────────────────────────────────────────────────── */

#input-bar {
  display: none;
  align-items: flex-end;
  gap: var(--sp-s);
  padding: var(--sp-s) var(--sp-m);
  padding-bottom: max(var(--sp-s), env(safe-area-inset-bottom));
  border-top: 1px solid var(--bg-2);
  background: var(--bg-1);
  flex-shrink: 0;
}

#msg-input {
  flex: 1;
  background: var(--bg-2);
  border: 1px solid var(--bg-3);
  color: var(--t1);
  font-family: var(--font);
  font-size: 15px; /* ≥16px prevents iOS zoom */
  padding: var(--sp-s) var(--sp-m);
  border-radius: var(--radius);
  resize: none;
  outline: none;
  max-height: 120px;
  min-height: 2.4rem;
  overflow-y: auto;
  line-height: 1.5;
}
#msg-input:focus { border-color: var(--tq-muted); }

.input-btn {
  background: var(--bg-2);
  border: 1px solid var(--bg-3);
  color: var(--t2);
  font-family: var(--font);
  font-size: 1rem;
  padding: var(--sp-s);
  border-radius: var(--radius);
  cursor: pointer;
  min-width: 2.4rem;
  min-height: 2.4rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .12s;
  flex-shrink: 0;
}
.input-btn:hover { background: var(--bg-3); }
.input-btn.transmitting {
  background: var(--danger);
  color: white;
  border-color: var(--danger);
  animation: pulse 0.6s infinite;
}

#send-btn {
  background: var(--bg-3);
  border: 1px solid var(--tq-muted);
  color: var(--tq);
  font-family: var(--font);
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  padding: var(--sp-s) var(--sp-m);
  border-radius: var(--radius);
  cursor: pointer;
  transition: background .12s;
  flex-shrink: 0;
  min-height: 2.4rem;
}
#send-btn:hover { background: var(--tq-muted); }

/* ── PTT BANNER ───────────────────────────────────────────────── */

#ptt-banner {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: var(--sp-xs) var(--sp-m);
  background: var(--danger);
  color: white;
  font-size: 0.72rem;
  letter-spacing: 0.15em;
  text-align: center;
  transform: translateY(-100%);
  transition: transform .2s;
  z-index: 300;
}
#ptt-banner.visible { transform: translateY(0); }

/* ── DRAG OVER ────────────────────────────────────────────────── */

#chat-area.drag-over::after {
  content: 'drop file to send';
  position: absolute;
  inset: 0;
  background: rgba(64,224,208,0.1);
  border: 2px dashed var(--tq);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  color: var(--tq);
  letter-spacing: 0.2em;
  pointer-events: none;
  z-index: 10;
}

/* ── SCROLLBAR ────────────────────────────────────────────────── */

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-4); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--t3); }

/* ── SIDEBAR BACKDROP (mobile) ────────────────────────────────── */

#sidebar-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 99;
}

/* ════════════════════════════════════════════════════════════════
   MOBILE (≤ 768px)
   ════════════════════════════════════════════════════════════════ */

@media (max-width: 768px) {
  html { font-size: 15px; }

  /* Sidebar slides in from left */
  #sidebar {
    position: fixed;
    top: 0; bottom: 0; left: 0;
    width: min(85vw, 320px);
    transform: translateX(-100%);
    z-index: 100;
    max-width: 100%;
  }
  #sidebar.open { transform: translateX(0); }

  #sidebar-backdrop { display: block; }
  #sidebar-backdrop.visible { display: block; opacity: 1; pointer-events: all; }

  /* Chat takes full width */
  #chat-area { width: 100%; }

  /* Show mobile back button */
  #mobile-back { display: flex; }

  /* Taller touch targets */
  .peer-tile { min-height: 4rem; }
  .input-btn,
  #send-btn   { min-height: 3rem; }
  #msg-input  { font-size: 16px; } /* prevent iOS zoom */

  /* Video call local view smaller */
  #local-video { width: 80px; height: 110px; }
}
</style>
</head>
<body>

<div id="ptt-banner">● transmitting</div>
<div id="sidebar-backdrop"></div>
<input type="file" id="file-input-hidden" multiple style="display:none" />

<div id="app">

  <!-- ── SIDEBAR ─────────────────────────────────────────── -->
  <aside id="sidebar">

    <div id="device-header">
      <div class="wordmark">Turquoise</div>

      <div id="nickname-display" title="Tap to edit">
        <span id="nickname-text" class="name">loading…</span>
        <span class="edit-icon">✎</span>
      </div>
      <input id="nickname-input" type="text" maxlength="32" autocomplete="off" />

      <div class="fp-short" id="fp-display"></div>

      <div id="status-row">
        <div class="status-dot disconnected" id="status-dot"></div>
        <span id="status-text">connecting…</span>
      </div>

      <div id="mode-toggle">
        <button class="mode-btn active" data-mode="online"  id="btn-online">🌐 online</button>
        <button class="mode-btn"        data-mode="offline" id="btn-offline">🏠 offline</button>
      </div>
    </div>

    <div id="propagation-banner">
      share app (no internet):<br/>
      <span id="propagation-url">—</span>
    </div>

    <div id="peer-list"></div>
    <div id="net-log"></div>

  </aside>

  <!-- ── MAIN CHAT ───────────────────────────────────────── -->
  <main id="chat-area">

    <div id="chat-header">
      <button id="mobile-back" aria-label="Back">‹</button>
      <span style="color:var(--tq-muted);font-size:0.75rem;letter-spacing:.15em;">
        select a peer
      </span>
    </div>

    <!-- Voice/video overlay -->
    <div id="call-overlay">
      <video id="remote-video" autoplay playsinline></video>
      <video id="local-video"  autoplay playsinline muted></video>
      <div class="call-controls">
        <button class="call-btn danger" id="hangup-btn">■ end call</button>
      </div>
    </div>

    <!-- Incoming call -->
    <div id="incoming-call" style="display:none">
      <div id="incoming-text">call from ?</div>
      <div style="display:flex;gap:.5rem;margin-top:.75rem;justify-content:center">
        <button class="call-btn active" id="accept-call-btn">✓ accept</button>
        <button class="call-btn danger" id="reject-call-btn">✕ decline</button>
      </div>
    </div>

    <div id="messages">
      <div class="empty-state">select a peer to start chatting</div>
    </div>

    <div id="input-bar">
      <button class="input-btn" id="ptt-btn" title="Hold to talk">🎙</button>
      <button class="input-btn" id="file-btn" title="Send file">＋</button>
      <textarea id="msg-input" placeholder="type a message…" rows="1"></textarea>
      <button id="send-btn">send</button>
    </div>

  </main>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
